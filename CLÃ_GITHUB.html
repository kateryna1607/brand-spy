<!DOCTYPE html>
<html>
<head>
    <title>BRAND SPY - Security Key</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #1a1816; color: #bda37a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #bda37a; text-align: center; max-width: 600px; }
        h1 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        textarea { width: 100%; height: 100px; background: #000; color: #fff; border: 1px solid #444; padding: 10px; margin-bottom: 20px; font-family: monospace; }
        button { background: #bda37a; color: #1a1816; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #d4bc91; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Clé BRAND SPY</h1>
        <p>Cliquez sur le bouton ci-dessous pour copier la clé de sécurité.</p>
        <textarea id="key">ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMgm3KXXO527X1y1Y7S1bSzyhsOQi9IuIHXosJcy92qV brandspy@maisonagostini.com</textarea>
        <br>
        <button onclick="copyKey()">Copier la Clé</button>
        <p id="status" style="margin-top: 15px; font-size: 0.9rem; color: #00ff00; display: none;">Copié ! Allez coller sur GitHub.</p>
    </div>

    <script>
        function copyKey() {
            var copyText = document.getElementById("key");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value).then(() => {
                document.getElementById("status").style.display = "block";
            });
        }
    </script>
</body>
</html>
